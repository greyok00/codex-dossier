services:
  postgres:
    image: postgres:16
    container_name: codex-dossier-postgres
    environment:
      POSTGRES_USER: dossier
      POSTGRES_PASSWORD: dossier
      POSTGRES_DB: dossier_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dossier -d dossier_test"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data:
